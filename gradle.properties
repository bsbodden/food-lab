kotlin.code.style=official
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
kotlin.mpp.stability.nowarn=true
android.useAndroidX=true
android.nonTransitiveRClass=true
# spmForKmp: don't generate the Swift startup file at config (keeps the android/wasm/jvm builds on Linux clean;
# the SwiftPM resolve only runs for the iOS link tasks on macOS).
spmforkmp.disableStartupFile=true
